<div class="flex h-full flex-col gap-3 p-4">
  <div class="flex-none">
    <a routerLink="/module-groups" class="text-sm text-blue-600 hover:text-blue-800">&larr; Back to modules</a>
  </div>

  @if (error(); as message) {
    <p class="flex-none rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ message }}</p>
  } @else if (loading()) {
    <p class="text-sm text-gray-500">Loading…</p>
  } @else if (module(); as mod) {
    <h2 class="flex-none text-sm font-semibold uppercase tracking-wide text-gray-500">
      {{ mod.name }} <span class="font-normal normal-case text-gray-400">({{ mod.type }})</span>
    </h2>
    <div class="min-h-0 flex-1">
      <app-command-table [moduleId]="mod.id" [moduleType]="mod.type" />
    </div>
  } @else {
    <p class="text-sm text-gray-500">Module not found.</p>
  }
</div>

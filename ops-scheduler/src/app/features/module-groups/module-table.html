<div class="flex h-full flex-col gap-2">
  <div class="flex flex-none items-center justify-between">
    <h2 class="text-sm font-semibold uppercase tracking-wide text-gray-500">Modules</h2>
    <button
      class="rounded bg-blue-600 px-3 py-1 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50"
      type="button"
      [disabled]="creating()"
      (click)="addModule()"
    >
      Add module
    </button>
  </div>

  @if (error(); as message) {
    <p class="flex-none rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ message }}</p>
  }

  <div class="min-h-0 flex-1">
    <ag-grid-angular
      class="h-full w-full"
      [theme]="theme"
      [rowData]="rowData()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [getRowId]="getRowId"
      [loading]="loading()"
      [singleClickEdit]="true"
      [cellSelection]="cellSelection"
      (cellValueChanged)="onCellValueChanged($event)"
      (cellClicked)="onCellClicked($event)"
    />
  </div>
</div>

<div class="flex h-full">
  <aside class="w-72 flex-none border-r border-gray-200">
    <app-schedule-list
      [selectedId]="selectedSchedule()?.id ?? null"
      (selectedScheduleChange)="onSelectedScheduleChange($event)"
    />
  </aside>

  <main class="flex min-w-0 flex-1 flex-col gap-4 p-4">
    @if (selectedSchedule(); as schedule) {
      <div class="flex items-start justify-between gap-4">
        <app-schedule-properties class="min-w-0 flex-1" [schedule]="schedule" (updated)="onScheduleUpdated($event)" />
        <button
          class="flex-none rounded bg-blue-600 px-3 py-1 text-sm font-medium text-white hover:bg-blue-700 disabled:opacity-50"
          type="button"
          [disabled]="exporting()"
          (click)="exportToExcel()"
        >
          {{ exporting() ? 'Exporting…' : 'Export to Excel' }}
        </button>
      </div>
      @if (exportError(); as message) {
        <p class="rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ message }}</p>
      }
      <div class="min-h-0 flex-1">
        <app-schedule-module-table [scheduleId]="schedule.id" />
      </div>
    } @else {
      <p class="text-sm text-gray-500">Select a schedule to edit it, or create a new one.</p>
    }
  </main>
</div>
